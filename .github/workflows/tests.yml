name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnm-dev libsoup2.4-dev curl wget libappindicator3-dev librsvg2-dev patchelf
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Create dummy dist (Tauri requirement)
        run: mkdir -p dist && touch dist/index.html

      - name: Cargo fmt (check)
        working-directory: desktop
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Cargo clippy
        working-directory: desktop
        run: cargo clippy --all-targets --no-deps -- -D warnings
        continue-on-error: true

      - name: Run Cargo Test
        working-directory: desktop
        run: cargo test --all-targets --verbose

  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Frontend
        run: pnpm frontend:build

      - name: Run Frontend Tests
        run: pnpm frontend:test
